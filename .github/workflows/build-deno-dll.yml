name: Build Deno Shared Library (DLL)

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-deno-dll:
    name: Build shared library for Deno (windows-x86_64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup CMake >= 3.30
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build shared library (Release)
        run: |
          cmake --build build --config Release

      - name: Collect DLL artifact for Deno
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deno-lib/windows-x86_64 | Out-Null
          Copy-Item -Force -Path build/**/Release/*.dll -Destination deno-lib/windows-x86_64/
          Get-ChildItem -Recurse deno-lib | Format-Table -AutoSize

      - name: Upload DLL artifact for Deno
        uses: actions/upload-artifact@v4
        with:
          name: cpp-bindings-windows-dll-windows-x86_64
          path: deno-lib/**


