name: Build & Release cpp_windows_bindings

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]
  release:
    types: [ created ]

jobs:

  build:
    name: Cross-build Windows shared library (MinGW)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install MinGW cross-compiler & build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 cmake ninja-build make

      - name: Configure CMake (MinGW)
        run: |
          cmake -S . -B build \
                -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/mingw64.cmake \
                -DCMAKE_BUILD_TYPE=Release

      - name: Compile
        run: cmake --build build -j $(nproc)

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcpp_windows_bindings
          path: |
            build/**/*.dll
            build/**/*.a
          retention-days: 14

      - name: Attach Windows artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/**/*.dll
            build/**/*.a 
