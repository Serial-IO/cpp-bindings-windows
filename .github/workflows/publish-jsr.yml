name: Publish to JSR (@serial/cpp-bindings-windows)

on:
  workflow_dispatch:
    inputs: {}

  push:
    branches:
      - "*"
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-jsr:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup CMake >= 3.30
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.x"

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build shared library (Release)
        run: |
          cmake --build build --config Release

      - name: Embed binary as JSON/base64 for JSR
        shell: pwsh
        run: |
          $dll = Get-ChildItem -Recurse -File build | Where-Object { $_.Name -eq "cpp_bindings_windows.dll" } | Select-Object -First 1
          if (-not $dll) { throw "Could not find cpp_bindings_windows.dll under build/" }
          ./jsr/scripts/embed_binary.ps1 $dll.FullName ./jsr/package/bin windows-x86_64
          Copy-Item -Force LICENSE ./jsr/package/LICENSE

      - name: Publish package to JSR (real)
        if: github.ref_type == 'tag'
        working-directory: jsr/package
        run: |
          deno publish --allow-dirty

      - name: Publish package to JSR (dry-run)
        if: github.ref_type != 'tag'
        working-directory: jsr/package
        run: |
          deno publish --allow-dirty --dry-run


