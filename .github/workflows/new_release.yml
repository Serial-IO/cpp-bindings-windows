# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
name: 'New Release'
description: |
  This workflow runs when a new tag is created.

on:
  push:
    branches: [ 'main' ]
    tags: [ '*' ]

jobs:
  tag-is-valid-package-version:
    name: 'Tag is Valid Package Version'
    runs-on: ubuntu-latest
    steps:
      - name: 'Check tag'
        id: check-tag
        env:
          TAG: ${{ github.ref_name }}

        run: |
          if [[ "$TAG" =~ ^(0|[1-9][[:digit:]]*)\.(0|[1-9][[:digit:]]*)\.(0|[1-9][[:digit:]]*)(-(alpha|rc|beta|experimental)\.[1-9][[:digit:]]*)?$ ]]; then
            echo "Version \"$TAG\" is a valid package version."
            echo "IS_VALID_PACKAGE_VERSION=true" >> $GITHUB_OUTPUT
          else
            echo "Version \"$PACKAGE_VERSION\" is not a valid package version."
            echo "IS_VALID_PACKAGE_VERSION=false" >> $GITHUB_OUTPUT
          fi
    
    outputs:
      is-valid-package-version: ${{ steps.check-tag.outputs.IS_VALID_PACKAGE_VERSION }}

  build-binary:
    name: 'Build Binary'
    runs-on: windows-latest
    needs: [ 'tag-is-valid-package-version' ]
    if: ${{ needs.tag-is-valid-package-version.outputs.is-valid-package-version == 'true' }}
    permissions:
      contents: write

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Setup and configure CMake'
        uses: './.github/actions/setup_and_configure_cmake'
        with:
          preset: 'windows-vs-release'
      
      - name: 'Build'
        id: build
        uses: './.github/actions/build_binary_and_export_env'
        with:
          preset: 'windows-vs-release'
          config: 'Release'
          target: 'cpp_bindings_windows'

      - name: 'Upload artifacts'
        uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: cpp_bindings_windows
          path: build/cpp_bindings_windows.dll
  
  test-unit-cpp:
    name: 'Test Unit C++'
    runs-on: windows-latest
    needs: [ 'build-binary' ]
    env:
      TEST_REPORT_NAME: 'test_report.xml'

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6

      - name: 'Download artifact'
        uses: actions/download-artifact@v4
        with:
          name: 'cpp_bindings_windows'
          path: artifacts

      - name: 'Setup and configure CMake'
        uses: './.github/actions/setup_and_configure_cmake'
        with:
          preset: 'windows-vs-release'
      
      - name: 'Build'
        id: build
        uses: './.github/actions/build_binary_and_export_env'
        with:
          preset: 'windows-vs-release'
          config: 'Release'
          target: 'cpp_bindings_windows'

      - name: 'Copy library artifact next to test exe'
        shell: pwsh
        run: |
          $testExe = Get-ChildItem `
            -Recurse `
            -Path build `
            -Filter cpp_bindings_windows_tests.exe `
            -File | Select-Object -First 1

          if ($testExe) {
            Copy-Item -Force artifacts/cpp_bindings_windows.dll $testExe.DirectoryName
          }

      - name: 'Run tests'
        shell: pwsh
        run: |
          $testExe = Get-ChildItem `
            -Recurse `
            -Path build `
            -Filter cpp_bindings_windows_tests.exe `
            -File | Select-Object -First 1

          if (-not $testExe) {
            throw "cpp_bindings_windows_tests.exe not found"
          }

          Push-Location $testExe.DirectoryName
          & $testExe.FullName --gtest_color=yes --gtest_output=xml:$env:TEST_REPORT_NAME
          Pop-Location

          Copy-Item (Join-Path $testExe.DirectoryName $env:TEST_REPORT_NAME) build/

      - name: 'Upload test report'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test_reports
          path: build/${{ env.TEST_REPORT_NAME }}

      - name: 'Publish test report'
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: 'build/${{ env.TEST_REPORT_NAME }}'
          detailed_summary: true
          group_suite: true
          include_passed: true
          annotate_notice: true
          check_title_template: '{{FILE_NAME}} | {{TEST_NAME}}'
  
  create-release:
    name: 'Create Release'
    runs-on: ubuntu-latest
    needs: [ 'test-unit-cpp' ]
    steps:
      - name: 'Download artifact'
        uses: actions/download-artifact@v4
        with:
          name: 'cpp_bindings_windows'
          path: 'artifacts'

      - name: 'Create GitHub Release'
        uses: softprops/action-gh-release@v2
        with:
          name: 'v${{ github.ref_name }}'
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/cpp_bindings_windows.dll
  
  publish-jsr:
    name: 'Publish JSR'
    runs-on: windows-latest
    needs: [ 'test-unit-cpp' ]
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 'Setup Deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.x'

      - name: 'Download artifact'
        uses: actions/download-artifact@v4
        with:
          name: 'cpp_bindings_windows'
          path: 'artifacts'

      - name: 'Prepare files for JSR'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./jsr/bin | Out-Null
          Copy-Item -Force ./artifacts/cpp_bindings_windows.dll ./jsr/bin/x86_64.dll
          
          ./jsr/scripts/binary_to_json.ps1 `
            artifacts/cpp_bindings_windows.dll `
            jsr/bin/x86_64.json windows-x86_64
          
          ./jsr/scripts/set_version.ps1 `
            jsr/jsr.json `
            "${{ github.ref_name }}"

      - name: 'Publish package to JSR (normal)'
        working-directory: jsr
        run: |
          deno publish --allow-dirty
