name: C++ Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  cpp-tests:
    name: C++ tests (msvc)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install virtual COM port driver (com0com)
        shell: pwsh
        run: |
          choco install com0com --yes --no-progress

      - name: Create virtual COM pair and start echo
        shell: pwsh
        run: |
          if (-not $env:ChocolateyInstall) { $env:ChocolateyInstall = "C:\ProgramData\chocolatey" }
          $pkgRoot = Join-Path $env:ChocolateyInstall "lib\com0com"
          if (-not (Test-Path $pkgRoot)) { throw "com0com package root not found at $pkgRoot" }

          # Fast, deterministic search for setupc.exe and com0com.inf (avoid full disk recursion).
          $setupCandidates = @(
            (Join-Path $pkgRoot "tools\\setupc.exe"),
            (Join-Path $pkgRoot "tools\\com0com\\setupc.exe"),
            "${env:ProgramFiles(x86)}\\com0com\\setupc.exe",
            "${env:ProgramFiles}\\com0com\\setupc.exe"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $setupcItem = $null
          foreach ($p in $setupCandidates) { $setupcItem = Get-Item -LiteralPath $p; break }
          if (-not $setupcItem) {
            $setupcItem = Get-ChildItem -Recurse -Depth 6 -File -Filter setupc.exe -ErrorAction SilentlyContinue $pkgRoot | Select-Object -First 1
          }
          if (-not $setupcItem) { throw "setupc.exe not found (checked candidates and searched depth<=6 under $pkgRoot)" }

          $infCandidates = @(
            (Join-Path $pkgRoot "tools\\com0com.inf"),
            (Join-Path $pkgRoot "tools\\com0com\\com0com.inf"),
            (Join-Path $setupcItem.DirectoryName "com0com.inf"),
            "C:\\Windows\\INF\\com0com.inf"
          ) | Where-Object { $_ -and (Test-Path $_) }

          $infItem = $null
          foreach ($p in $infCandidates) { $infItem = Get-Item -LiteralPath $p; break }
          if (-not $infItem) {
            $infItem = Get-ChildItem -Recurse -Depth 6 -File -Filter com0com.inf -ErrorAction SilentlyContinue $pkgRoot | Select-Object -First 1
          }
          if (-not $infItem) { throw "com0com.inf not found (checked candidates and searched depth<=6 under $pkgRoot)" }

          # Create COM5<->COM6
          Push-Location $infItem.DirectoryName
          & $setupcItem.FullName install PortName=COM5 PortName=COM6 | Out-Host
          Pop-Location

          # Start an echo loop on COM6 in the background
          $echoScript = @'
          Add-Type -AssemblyName System.IO.Ports
          $sp = New-Object System.IO.Ports.SerialPort "COM6", 115200, "None", 8, "One"
          $sp.ReadTimeout = 500
          $sp.WriteTimeout = 500
          $sp.Open()
          try {
            while ($true) {
              try {
                $b = $sp.ReadByte()
                if ($b -ge 0) { $sp.BaseStream.WriteByte([byte]$b); $sp.BaseStream.Flush() }
              } catch [System.TimeoutException] {
                continue
              }
            }
          } finally {
            $sp.Close()
          }
          '@
          Set-Content -Path echo.ps1 -Value $echoScript -Encoding utf8
          Start-Process pwsh -ArgumentList "-NoProfile","-ExecutionPolicy","Bypass","-File","echo.ps1" -WindowStyle Hidden
          Start-Sleep -Seconds 2

      - name: Setup CMake >= 3.30
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.31.x"

      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        run: |
          cmake --build build --config Release

      - name: Run C++ unit/integration tests
        env:
          SERIAL_TEST_PORT: COM5
        run: |
          ctest --test-dir build -C Release --output-on-failure


